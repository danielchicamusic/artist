<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senzi · Panel de pacientes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#F7FAF9; --surface:#FFFFFF; --ink:#1E2D2B;
    --teal:#1B7A6B; --teal-dark:#125B4F; --coral:#E8694A;
    --line:#DCE8E5; --muted:#5C7470;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;min-height:100vh;}
  .wrap{max-width:1040px;margin:0 auto;padding:32px 24px 80px;}
  header.top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px;}
  .brand h1{font-family:'Fraunces',serif;font-weight:600;font-size:28px;margin:0;letter-spacing:-0.01em;}
  .brand .dot{color:var(--teal);}
  #logoutBtn{background:none;border:1px solid var(--line);color:var(--muted);padding:8px 14px;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;}
  #logoutBtn:hover{border-color:var(--teal);color:var(--teal);}

  #loginScreen{max-width:380px;margin:14vh auto 0;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:36px 32px;box-shadow:0 1px 2px rgba(30,45,43,0.04);}
  #loginScreen h1{font-family:'Fraunces',serif;font-size:24px;margin:0 0 4px;}
  #loginScreen p.lead{color:var(--muted);font-size:14px;margin:0 0 24px;}
  #loginScreen label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px;font-weight:500;}
  #loginScreen input{width:100%;padding:11px 12px;margin-bottom:16px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;background:#fff;color:var(--ink);}
  #loginScreen input:focus{outline:2px solid var(--teal);outline-offset:1px;border-color:var(--teal);}
  #loginBtn{width:100%;padding:12px;background:var(--teal);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;}
  #loginBtn:hover{background:var(--teal-dark);}
  #loginError{color:var(--coral);font-size:13px;margin-top:14px;display:none;}

  .stats{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap;}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px 20px;min-width:140px;}
  .stat .num{font-family:'Fraunces',serif;font-size:30px;font-weight:600;color:var(--teal-dark);}
  .stat .label{font-size:12px;color:var(--muted);margin-top:2px;}

  #searchInput{width:100%;padding:12px 16px;border:1px solid var(--line);border-radius:10px;font-size:14px;margin-bottom:18px;font-family:'Inter',sans-serif;background:#fff;color:var(--ink);}
  #searchInput:focus{outline:2px solid var(--teal);outline-offset:1px;border-color:var(--teal);}

  .tableWrap{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  thead th{text-align:left;font-size:11px;letter-spacing:0.04em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:14px 18px;border-bottom:1px solid var(--line);}
  tbody td{padding:14px 18px;border-bottom:1px solid var(--line);vertical-align:top;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:#FAFCFB;}
  td.phone, td.date{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--muted);}
  td.name{font-weight:500;}
  .pill{display:inline-block;font-size:11px;padding:3px 10px;border-radius:100px;background:#E9F4F1;color:var(--teal-dark);font-weight:500;}
  #emptyState, #loadingState{padding:48px 18px;text-align:center;color:var(--muted);font-size:14px;}
  #errorBanner{background:#FDEEEA;border:1px solid #F3C7B9;color:var(--coral);padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:18px;display:none;}

  @media (max-width:560px){
    .wrap{padding:20px 16px 60px;}
    thead{display:none;}
    table, tbody, tr, td{display:block;width:100%;}
    tbody tr{border-bottom:1px solid var(--line);padding:14px 0;}
    tbody td{border-bottom:none;padding:4px 0;}
    td.name{font-size:15px;}
    td::before{content:attr(data-label);display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:2px;}
  }
</style>
</head>
<body>

<div id="loginScreen">
  <h1>Senzi <span style="color:var(--teal)">·</span> Panel</h1>
  <p class="lead">Acceso solo para el equipo de la clínica.</p>
  <form id="loginForm">
    <label for="email">Correo</label>
    <input id="email" type="email" required autocomplete="username" value="solucionestechnics@gmail.com">
    <label for="password">Contraseña</label>
    <input id="password" type="password" required autocomplete="current-password">
    <button id="loginBtn" type="submit">Entrar</button>
  </form>
  <div id="loginError"></div>
</div>

<div class="wrap" id="dashboard" style="display:none;">
  <header class="top">
    <div class="brand"><h1>Senzi <span class="dot">·</span> Pacientes</h1></div>
    <button id="logoutBtn">Cerrar sesión</button>
  </header>

  <div id="errorBanner"></div>

  <div class="stats">
    <div class="stat"><div class="num" id="totalCount">—</div><div class="label">Leads totales</div></div>
    <div class="stat"><div class="num" id="todayCount">—</div><div class="label">Registrados hoy</div></div>
  </div>

  <input id="searchInput" type="text" placeholder="Buscar por nombre o teléfono…">

  <div class="tableWrap">
    <div id="loadingState">Cargando pacientes…</div>
    <div id="emptyState" style="display:none;">Ningún paciente coincide con la búsqueda.</div>
    <table id="patientsTable" style="display:none;">
      <thead>
        <tr><th>Nombre</th><th>Teléfono</th><th>Especialidad de interés</th><th>Origen</th><th>Registrado</th></tr>
      </thead>
      <tbody id="patientsBody"></tbody>
    </table>
  </div>
</div>

<script>
  // === Pega tus propios valores aquí (Supabase > Settings > API) ===
  const SUPABASE_URL = 'https://divffgymgcopvjsiizvm.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_GUhsvH_4Q_jzVzvBTydBVQ_gqzgJFae';

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  let allPatients = [];

  const loginScreen = document.getElementById('loginScreen');
  const dashboard = document.getElementById('dashboard');
  const loginForm = document.getElementById('loginForm');
  const loginError = document.getElementById('loginError');
  const errorBanner = document.getElementById('errorBanner');

  const show = (el, msg) => { el.textContent = msg; el.style.display = 'block'; };
  const hide = (el) => { el.style.display = 'none'; };

  async function checkSession() {
    const { data } = await supabaseClient.auth.getSession();
    if (data.session) showDashboard();
  }

  function showDashboard() {
    loginScreen.style.display = 'none';
    dashboard.style.display = 'block';
    loadPatients();
  }

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    hide(loginError);
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) return show(loginError, 'Correo o contraseña incorrectos.');
    showDashboard();
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    location.reload();
  });

  async function loadPatients() {
    hide(errorBanner);
    const { data, error } = await supabaseClient
      .from('pacientes')
      .select('nombre, telefono, especialidad_interes, origen, fecha_registro')
      .order('fecha_registro', { ascending: false });

    document.getElementById('loadingState').style.display = 'none';
    if (error) return show(errorBanner, 'No se pudo cargar la lista: ' + error.message);

    allPatients = data || [];
    renderStats(allPatients);
    renderTable(allPatients);
  }

  function renderStats(patients) {
    document.getElementById('totalCount').textContent = patients.length;
    const today = new Date().toISOString().slice(0, 10);
    document.getElementById('todayCount').textContent =
      patients.filter(p => (p.fecha_registro || '').slice(0, 10) === today).length;
  }

  function renderTable(patients) {
    const tbody = document.getElementById('patientsBody');
    const table = document.getElementById('patientsTable');
    const empty = document.getElementById('emptyState');

    if (patients.length === 0) {
      table.style.display = 'none';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    table.style.display = 'table';

    tbody.innerHTML = patients.map(p => `
      <tr>
        <td class="name" data-label="Nombre">${escapeHtml(p.nombre || '—')}</td>
        <td class="phone" data-label="Teléfono">${escapeHtml(p.telefono || '—')}</td>
        <td data-label="Especialidad"><span class="pill">${escapeHtml(p.especialidad_interes || 'Sin especificar')}</span></td>
        <td data-label="Origen">${escapeHtml(p.origen || '—')}</td>
        <td class="date" data-label="Registrado">${formatDate(p.fecha_registro)}</td>
      </tr>
    `).join('');
  }

  function formatDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('es-CO', { day: '2-digit', month: 'short', year: 'numeric' }) +
      ' ' + d.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  document.getElementById('searchInput').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase().trim();
    renderTable(allPatients.filter(p =>
      (p.nombre || '').toLowerCase().includes(q) || (p.telefono || '').toLowerCase().includes(q)
    ));
  });

  checkSession();
</script>
</body>
</html>
